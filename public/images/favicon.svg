<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Green background -->
  <rect width="512" height="512" rx="96" fill="#2D6A27"/>
  <!-- Subtle top highlight using SVG opacity, not rgba() -->
  <rect width="512" height="230" rx="96" fill="white" fill-opacity="0.07"/>
  <!-- DGM text, vertically centered -->
  <text x="256" y="256"
        font-family="'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="190"
        fill="white"
        text-anchor="middle"
        dominant-baseline="central"
        letter-spacing="-3">DGM</text>
</svg>
