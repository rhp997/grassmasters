<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-label="Dodson Grass Masters Logo">
  <!-- Grass blades -->
  <g fill="#B8E04A">
    <!-- Center cluster -->
    <path d="M190,90 Q185,60 192,30 Q196,60 200,90Z"/>
    <path d="M200,90 Q202,55 210,25 Q212,58 208,90Z"/>
    <path d="M180,90 Q172,65 178,38 Q184,65 186,90Z"/>
    <!-- Left cluster -->
    <path d="M130,95 Q125,68 133,42 Q137,68 138,95Z"/>
    <path d="M142,92 Q140,62 148,35 Q150,64 148,92Z"/>
    <path d="M118,98 Q110,72 116,50 Q122,72 124,98Z"/>
    <!-- Right cluster -->
    <path d="M258,95 Q254,68 262,42 Q266,68 265,95Z"/>
    <path d="M270,92 Q272,62 278,36 Q280,65 276,92Z"/>
    <path d="M246,98 Q240,70 248,48 Q254,70 252,98Z"/>
    <!-- Far left -->
    <path d="M68,102 Q64,76 72,52 Q76,76 74,102Z"/>
    <path d="M82,98 Q80,70 88,46 Q90,70 86,98Z"/>
    <!-- Far right -->
    <path d="M316,102 Q312,76 320,52 Q324,76 322,102Z"/>
    <path d="M330,98 Q328,70 336,46 Q338,70 334,98Z"/>
  </g>
  <!-- Darker grass bases -->
  <g fill="#7DC63F" opacity="0.6">
    <ellipse cx="190" cy="95" rx="30" ry="8"/>
    <ellipse cx="135" cy="99" rx="22" ry="6"/>
    <ellipse cx="264" cy="99" rx="22" ry="6"/>
    <ellipse cx="75" cy="104" rx="16" ry="5"/>
    <ellipse cx="323" cy="104" rx="16" ry="5"/>
  </g>

  <!-- DODSON text -->
  <text x="200" y="128" font-family="'Montserrat','Arial Black',sans-serif" font-size="36" font-weight="900"
        fill="none" stroke="#FFFFFF" stroke-width="1.5" text-anchor="middle" letter-spacing="8">DODSON</text>
  <text x="200" y="128" font-family="'Montserrat','Arial Black',sans-serif" font-size="36" font-weight="900"
        fill="#FFFFFF" fill-opacity="0.15" text-anchor="middle" letter-spacing="8">DODSON</text>

  <!-- Separator line -->
  <line x1="60" y1="137" x2="340" y2="137" stroke="#B8E04A" stroke-width="2"/>

  <!-- GRASS MASTERS text -->
  <text x="200" y="168" font-family="'Montserrat','Arial Black',sans-serif" font-size="28" font-weight="900"
        fill="none" stroke="#FFFFFF" stroke-width="1.5" text-anchor="middle" letter-spacing="6">GRASS MASTERS</text>
  <text x="200" y="168" font-family="'Montserrat','Arial Black',sans-serif" font-size="28" font-weight="900"
        fill="#FFFFFF" fill-opacity="0.15" text-anchor="middle" letter-spacing="6">GRASS MASTERS</text>
</svg>
