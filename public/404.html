<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Dodson Grass Masters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --gm-green-dark: #1B4D1A;
      --gm-lime: #B8E04A;
    }
    body {
      margin: 0;
      font-family: 'Open Sans', sans-serif;
      background: var(--gm-green-dark);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .num {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 800;
      color: var(--gm-lime);
      line-height: 1;
      text-shadow: 0 4px 30px rgba(184,224,74,.3);
    }
    h1 { font-family: 'Montserrat', sans-serif; font-size: 1.6rem; margin: .5rem 0 1rem; }
    p { color: rgba(255,255,255,.7); max-width: 380px; margin: 0 auto 2rem; }
    a {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: var(--gm-lime);
      color: #1A2A19;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      text-decoration: none;
      border-radius: 30px;
      padding: .75rem 1.75rem;
    }
    a:hover { opacity: .9; }
  </style>
</head>
<body>
  <div>
    <div class="num">404</div>
    <h1>Page Not Found</h1>
    <p>Looks like this page got lost in the tall grass. Let's get you back to the home lawn.</p>
    <a href="/"><i class="bi bi-house-fill"></i> Go Home</a>
  </div>
</body>
</html>
